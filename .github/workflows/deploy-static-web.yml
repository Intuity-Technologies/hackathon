name: Deploy Static Web

on:
  push:
    branches:
      - main
    paths:
      - static-web/**
      - .github/workflows/deploy-static-web.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-static-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Azure Static Web App
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Required Secret
        run: |
          if [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" ]; then
            echo "Missing required secret: AZURE_STATIC_WEB_APPS_API_TOKEN"
            exit 1
          fi

      - name: Ensure Static Bundle Exists
        run: |
          test -f static-web/index.html || (echo "static-web/index.html not found" && exit 1)

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          output_location: "static-web"
          skip_app_build: true

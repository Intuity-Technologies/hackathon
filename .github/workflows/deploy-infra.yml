name: Deploy Infra

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      resource_group:
        description: Target Azure resource group
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-infra-${{ github.ref }}-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Parameter File
        id: params
        run: |
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            echo "file=.github/infra/parameters.prod.json" >> "$GITHUB_OUTPUT"
          else
            echo "file=.github/infra/parameters.dev.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep
        run: az bicep build --file .github/infra/main.bicep

      - name: What-If
        run: |
          az deployment group what-if \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --template-file .github/infra/main.bicep \
            --parameters @"${{ steps.params.outputs.file }}"

      - name: Deploy
        run: |
          az deployment group create \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --template-file .github/infra/main.bicep \
            --parameters @"${{ steps.params.outputs.file }}"

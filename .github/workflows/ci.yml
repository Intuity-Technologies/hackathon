name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PIPELINE_DATA_MODE: local
      LOCAL_DATA_ROOT: data
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            etl/requirements.txt
            api/requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt -r etl/requirements.txt -r api/requirements.txt

      - name: Compile Python Sources
        run: python -m compileall api etl service model web.py

      - name: Lint
        run: ruff check .

      - name: Run Tests
        run: pytest

      - name: Build Local Demo Artifacts
        run: python etl/transform/build_demo_artifacts.py

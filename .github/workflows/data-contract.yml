name: Data Contract

on:
  push:
    paths:
      - etl/**
      - api/function_app.py
      - .github/workflows/data-contract.yml
  pull_request:
    paths:
      - etl/**
      - api/function_app.py
      - .github/workflows/data-contract.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: data-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-signals:
    name: Validate Signals Contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
      PIPELINE_DATA_MODE: adls
      AREA_LEVEL: county
      PYTHONPATH: .
      RAW_FILE_SYSTEM: raw
      CURATED_FILE_SYSTEM: curated
      SIGNALS_FILE_SYSTEM: signals
      DEMO_ARTIFACTS_FILE_SYSTEM: demo
      POPULATION_SOURCE_PATH: cso_population/year=2022/population.csv
      RENTS_SOURCE_PATH: rents/year=2024/rents.csv
      PLANNING_SOURCE_PATH: planning/year=2024/planning.csv
      POPULATION_CURATED_PATH: population/area_level=county/part-000.parquet
      RENTS_CURATED_PATH: rents/area_level=county/part-000.parquet
      PLANNING_CURATED_PATH: planning/area_level=county/part-000.parquet
      SIGNALS_FILE_PATH: housing_pressure/area_level=county/part-000.parquet
      SIGNALS_LATEST_JSON_PATH: housing_pressure/latest.json
      DEMO_OVERVIEW_PATH: housing_pressure/overview.json
      DEMO_LEADERBOARD_PATH: housing_pressure/leaderboard.json
      DEMO_AREA_DETAIL_PATH: housing_pressure/area_detail.json
      DEMO_COMPARE_PATH: housing_pressure/compare.json
      DEMO_TRENDS_PATH: housing_pressure/trends.json
      DEMO_SOURCES_PATH: housing_pressure/sources_manifest.json
      PLANNING_STRICT_COUNTY_ONLY: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Required Azure Config
        run: |
          test -n "${AZURE_STORAGE_ACCOUNT}" || (echo "Missing secret AZURE_STORAGE_ACCOUNT" && exit 1)

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            etl/requirements.txt
            api/requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt -r api/requirements.txt

      - name: Build Curated Parquets, Signals, And Demo Artifacts
        run: |
          python etl/transform/normalize_population.py
          python etl/transform/normalize_rents.py
          python etl/transform/normalize_planning.py
          python etl/transform/build_signals.py
          python etl/transform/build_demo_artifacts.py

      - name: Validate Signal Contract
        run: |
          python etl/tests/check_signals_contract.py \
            --min-periods 4 \
            --min-areas 3

      - name: Validate API And Demo Artifacts Can Read Azure Storage
        run: |
          python - <<'PY'
          from api.function_app import MODEL_FEATURE_COLUMNS, load_signal_dataframe
          from service.housing_data import get_area_detail, get_overview

          df = load_signal_dataframe()
          if df.empty:
              raise ValueError("API load_signal_dataframe returned an empty dataframe")

          missing = sorted(set(MODEL_FEATURE_COLUMNS) - set(df.columns))
          if missing:
              raise ValueError(f"Signals missing model feature columns: {missing}")

          overview = get_overview()
          mayo = get_area_detail("Mayo")
          if overview["summary"]["counties_covered"] < 26 or not mayo:
              raise ValueError("Demo artifacts were not published/read correctly from Azure storage")

          print(f"Azure read check passed with {len(df)} signal rows and demo coverage for {overview['summary']['counties_covered']} counties")
          PY

name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - .github/workflows/deploy-api.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Azure Function App
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Compile API
        run: python -m compileall api

      - name: Validate Required Secrets
        run: |
          if [ -z "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" ] || [ -z "${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_6B5452372BFF4346BCDD23BFB8249BD0 }}" ]; then
            echo "Missing required secrets: AZURE_FUNCTIONAPP_NAME and/or AZURE_FUNCTIONAPP_PUBLISH_PROFILE"
            exit 1
          fi

      - name: Deploy To Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      - name: Smoke Test API Health Endpoint
        run: |
          url="https://${{ secrets.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/health"
          echo "Checking ${url}"
          for attempt in $(seq 1 12); do
            status_code="$(curl -sS -o /tmp/api-health.json -w "%{http_code}" "${url}" || true)"
            if [ "${status_code}" = "200" ]; then
              echo "API health check passed."
              cat /tmp/api-health.json
              exit 0
            fi
            echo "Attempt ${attempt}/12 returned ${status_code}. Retrying in 10s."
            sleep 10
          done
          echo "API health check failed after retries."
          exit 1

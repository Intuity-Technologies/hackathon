name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - web.py
      - templates/**
      - service/**
      - .github/workflows/deploy-web.yml
      - requirements.txt
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Flask Web App
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Flask App
        run: python -m compileall service web.py

      - name: Validate Required Secrets
        run: |
          if [ -z "${{ secrets.AZURE_WEBAPP_NAME }}" ] || [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ] || [ -z "${{ secrets.AZURE_CREDENTIALS }}" ] || [ -z "${{ secrets.AZURE_OPENAI_API_KEY }}" ] || [ -z "${{ secrets.AZURE_OPENAI_ENDPOINT }}" ] || [ -z "${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" ] || [ -z "${{ secrets.FLASK_SECRET_KEY }}" ]; then
            echo "Missing required secrets for web deploy or hosted LLM configuration."
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync Hosted App Settings
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
        run: |
          resource_group="$(az resource list --name "${AZURE_WEBAPP_NAME}" --resource-type Microsoft.Web/sites --query "[0].resourceGroup" -o tsv)"
          if [ -z "${resource_group}" ]; then
            echo "Could not resolve resource group for ${AZURE_WEBAPP_NAME}"
            exit 1
          fi

          az webapp config appsettings set \
            --resource-group "${resource_group}" \
            --name "${AZURE_WEBAPP_NAME}" \
            --settings \
            AZURE_OPENAI_API_KEY="${AZURE_OPENAI_API_KEY}" \
            AZURE_OPENAI_ENDPOINT="${AZURE_OPENAI_ENDPOINT}" \
            AZURE_OPENAI_DEPLOYMENT_NAME="${AZURE_OPENAI_DEPLOYMENT_NAME}" \
            FLASK_SECRET_KEY="${FLASK_SECRET_KEY}" >/dev/null

      - name: Smoke Test Web App
        run: |
          url="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/"
          echo "Checking ${url}"
          for attempt in $(seq 1 12); do
            status_code="$(curl -sS -o /tmp/web-health.html -w "%{http_code}" "${url}" || true)"
            if [ "${status_code}" = "200" ]; then
              echo "Web app check passed."
              exit 0
            fi
            echo "Attempt ${attempt}/12 returned ${status_code}. Retrying in 10s."
            sleep 10
          done
          echo "Web app check failed after retries."
          exit 1

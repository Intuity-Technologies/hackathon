name: Deploy Model (Azure ML)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment for optional Bicep deployment
        required: false
        default: dev
        type: choice
        options:
          - dev
          - prod
      resource_group:
        description: Azure resource group containing the ML workspace
        required: true
        type: string
      workspace_name:
        description: Azure ML workspace name
        required: true
        type: string
      deploy_infra:
        description: Deploy Bicep infrastructure before data/model release
        required: false
        default: false
        type: boolean
      refresh_data:
        description: Pull latest CSO tables and rebuild ETL signals before training
        required: false
        default: true
        type: boolean
      cso_population_table_id:
        description: CSO PxStat table id for population signal
        required: false
        default: PEA08
        type: string
      cso_rents_table_id:
        description: CSO PxStat table id for rent signal
        required: false
        default: RIQ02
        type: string
      cso_planning_table_id:
        description: CSO PxStat table id for planning/completions signal
        required: false
        default: NDQ05
        type: string
      planning_strict_mode:
        description: PLANNING_STRICT_COUNTY_ONLY value
        required: false
        default: auto
        type: choice
        options:
          - auto
          - "true"
          - "false"
      model_version:
        description: Azure ML model version. Use auto for UTC timestamp versioning
        required: false
        default: auto
        type: string
      endpoint_name:
        description: Azure ML online endpoint name
        required: false
        default: irish-housing-signals-endpoint
        type: string
      deployment_name:
        description: Azure ML online deployment name
        required: false
        default: blue
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-model-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-model:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AZURE_RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
      AZURE_ML_WORKSPACE: ${{ github.event.inputs.workspace_name }}
      AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AREA_LEVEL: county
      PYTHONPATH: .
      RAW_FILE_SYSTEM: raw
      CURATED_FILE_SYSTEM: curated
      SIGNALS_FILE_SYSTEM: signals
      POPULATION_SOURCE_PATH: cso_population/latest/population.csv
      RENTS_SOURCE_PATH: rents/latest/rents.csv
      PLANNING_SOURCE_PATH: planning/latest/planning.csv
      POPULATION_CURATED_PATH: population/area_level=county/part-000.parquet
      RENTS_CURATED_PATH: rents/area_level=county/part-000.parquet
      PLANNING_CURATED_PATH: planning/area_level=county/part-000.parquet
      SIGNALS_FILE_PATH: housing_pressure/area_level=county/part-000.parquet
      SIGNALS_LATEST_JSON_PATH: housing_pressure/latest.json
      PLANNING_STRICT_COUNTY_ONLY: ${{ github.event.inputs.planning_strict_mode || 'auto' }}
      CSO_POPULATION_TABLE_ID: ${{ github.event.inputs.cso_population_table_id || 'PEA08' }}
      CSO_RENTS_TABLE_ID: ${{ github.event.inputs.cso_rents_table_id || 'RIQ02' }}
      CSO_PLANNING_TABLE_ID: ${{ github.event.inputs.cso_planning_table_id || 'NDQ05' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Infra Parameter File
        id: params
        run: |
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            echo "file=.github/infra/parameters.prod.json" >> "$GITHUB_OUTPUT"
          else
            echo "file=.github/infra/parameters.dev.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Required Azure Config
        if: ${{ github.event.inputs.refresh_data != 'false' }}
        run: |
          test -n "${AZURE_STORAGE_ACCOUNT}" || (echo "Missing secret AZURE_STORAGE_ACCOUNT" && exit 1)

      - name: Validate Bicep
        if: ${{ github.event.inputs.deploy_infra == 'true' }}
        run: az bicep build --file .github/infra/main.bicep

      - name: Deploy Infrastructure
        if: ${{ github.event.inputs.deploy_infra == 'true' }}
        run: |
          az deployment group create \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --template-file .github/infra/main.bicep \
            --parameters @"${{ steps.params.outputs.file }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            etl/requirements.txt
            api/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt -r api/requirements.txt
          pip install joblib scikit-learn

      - name: Pull Latest CSO PxStat Tables
        if: ${{ github.event.inputs.refresh_data != 'false' }}
        run: |
          python etl/ingest/fetch_pxstat_table.py "${CSO_POPULATION_TABLE_ID}" \
            --format CSV \
            --file-system "${RAW_FILE_SYSTEM}" \
            --blob-path "${POPULATION_SOURCE_PATH}"
          python etl/ingest/fetch_pxstat_table.py "${CSO_RENTS_TABLE_ID}" \
            --format CSV \
            --file-system "${RAW_FILE_SYSTEM}" \
            --blob-path "${RENTS_SOURCE_PATH}"
          python etl/ingest/fetch_pxstat_table.py "${CSO_PLANNING_TABLE_ID}" \
            --format CSV \
            --file-system "${RAW_FILE_SYSTEM}" \
            --blob-path "${PLANNING_SOURCE_PATH}"

      - name: Build Curated Signals
        if: ${{ github.event.inputs.refresh_data != 'false' }}
        run: |
          python etl/transform/normalize_population.py
          python etl/transform/normalize_rents.py
          python etl/transform/normalize_planning.py
          python etl/transform/build_signals.py
          python etl/tests/check_signals_contract.py \
            --min-periods 4 \
            --min-areas 3

      - name: Download Training Dataset From ADLS
        if: ${{ github.event.inputs.refresh_data != 'false' }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          from azure.identity import DefaultAzureCredential
          from azure.storage.filedatalake import DataLakeServiceClient

          account = os.getenv("AZURE_STORAGE_ACCOUNT", "").strip()
          if not account:
              raise ValueError("AZURE_STORAGE_ACCOUNT env var not set")

          fs_name = os.getenv("SIGNALS_FILE_SYSTEM", "signals")
          file_path = os.getenv(
              "SIGNALS_FILE_PATH",
              "housing_pressure/area_level=county/part-000.parquet",
          )
          out_path = Path("model/artifacts/training_signals.parquet")
          out_path.parent.mkdir(parents=True, exist_ok=True)

          svc = DataLakeServiceClient(
              account_url=f"https://{account}.dfs.core.windows.net",
              credential=DefaultAzureCredential(),
          )
          fs = svc.get_file_system_client(fs_name)
          payload = fs.get_file_client(file_path).download_file().readall()
          out_path.write_bytes(payload)
          print(f"Saved ADLS training parquet to {out_path}")
          PY

      - name: Resolve Training Dataset Path
        id: training-data
        run: |
          if [ "${{ github.event.inputs.refresh_data }}" = "false" ]; then
            echo "path=data/signals/housing_pressure/area_level=county/part-000.parquet" >> "$GITHUB_OUTPUT"
          else
            echo "path=model/artifacts/training_signals.parquet" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Model Version
        id: model-version
        run: |
          if [ "${{ github.event.inputs.model_version }}" = "auto" ]; then
            value="$(date -u +%Y%m%d%H%M%S)"
          else
            value="${{ github.event.inputs.model_version }}"
          fi
          echo "model_version=${value}" >> "$GITHUB_OUTPUT"
          echo "Resolved model version ${value}"

      - name: Train Baseline Model Artifact
        env:
          SIGNALS_TRAINING_PARQUET: ${{ steps.training-data.outputs.path }}
        run: python model/training/train_baseline.py

      - name: Install Azure ML CLI Extension
        run: az extension add --name ml --upgrade

      - name: Register Model
        run: |
          az ml model create \
            --name housing-pressure-model \
            --version "${{ steps.model-version.outputs.model_version }}" \
            --path model/artifacts/housing_pressure_model.joblib \
            --type custom_model \
            --description "RandomForest baseline for county-level housing pressure score inference." \
            --tags release_run="${{ github.run_id }}" source_commit="${{ github.sha }}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --workspace-name "${AZURE_ML_WORKSPACE}"

      - name: Render Endpoint And Deployment Specs
        env:
          ENDPOINT_NAME: ${{ github.event.inputs.endpoint_name || 'irish-housing-signals-endpoint' }}
          DEPLOYMENT_NAME: ${{ github.event.inputs.deployment_name || 'blue' }}
          MODEL_VERSION: ${{ steps.model-version.outputs.model_version }}
        run: |
          sed "s/^name: .*/name: ${ENDPOINT_NAME}/" \
            model/azureml/endpoint.yml > model/azureml/endpoint.generated.yml

          sed \
            -e "s/^name: .*/name: ${DEPLOYMENT_NAME}/" \
            -e "s/^endpoint_name: .*/endpoint_name: ${ENDPOINT_NAME}/" \
            -e "s|^model: .*|model: azureml:housing-pressure-model:${MODEL_VERSION}|" \
            model/azureml/deployment.yml > model/azureml/deployment.generated.yml

      - name: Create Endpoint If Missing
        env:
          ENDPOINT_NAME: ${{ github.event.inputs.endpoint_name || 'irish-housing-signals-endpoint' }}
        run: |
          if az ml online-endpoint show \
            --name "${ENDPOINT_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --workspace-name "${AZURE_ML_WORKSPACE}" >/dev/null 2>&1; then
            echo "Endpoint ${ENDPOINT_NAME} already exists."
          else
            az ml online-endpoint create \
              --file model/azureml/endpoint.generated.yml \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --workspace-name "${AZURE_ML_WORKSPACE}"
          fi

      - name: Create/Update Deployment
        run: |
          az ml online-deployment create \
            --file model/azureml/deployment.generated.yml \
            --all-traffic \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --workspace-name "${AZURE_ML_WORKSPACE}"

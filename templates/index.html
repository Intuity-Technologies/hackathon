<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Housing Analysis Assistant</title>

<style>
:root {
  
  /* Backgrounds */
  --bg: #0d1117;          /* dark metallic grey */
  --panel: #161b22;       /* slightly lighter card */

  /* Structure */
  --border: rgba(255,255,255,0.08);

  /* Text */
  --text: #e6edf3;
  --muted: #9da7b3;

  /* Chat bubbles */
  --user: #1f2937;        /* dark navy/blue-grey */
  --assistant: #0b2a3a;   /* steel blue */

  /* Accents */
  --accent: #3b82f6;      /* soft blue (buttons, focus) */
}

html,body{
  height:100%;
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: radial-gradient(1200px 700px at 20% 0%, rgba(59,130,246,.20), transparent 55%),
              radial-gradient(900px 600px at 80% 10%, rgba(30,58,138,.25), transparent 60%),
              var(--bg);
  color: var(--text);
}


.logo {
  height: 25px;
  width: auto;
}

.app{
  max-width: 820px;
  height: 92vh;
  margin: 4vh auto;
  display:flex;
  flex-direction:column;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;          /* rounded ALL corners */
  overflow: hidden;             /* prevents square bottom corners */
  box-shadow: 0 24px 60px rgba(0,0,0,.45);
}

.header{
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-weight: 650;
  letter-spacing: .2px;
}

.header .tag{
  font-size: 12px;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 999px;
}

.chat{
  flex:1;
  padding: 18px 18px 10px;
  overflow-y:auto;
}

.row{
  display:flex;
  margin: 10px 0;
}

.bubble{
  max-width: 62%;
  padding: 10px 12px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.35;
  white-space: pre-wrap;
  border: 1px solid var(--border);
}

.row.user{
  justify-content:flex-end;
}
.row.user .bubble{
  background: linear-gradient(180deg, rgba(59,130,246,.25), rgba(30,58,138,.35));
  border-color: rgba(59,130,246,.22);
}

.row.assistant{
  justify-content:flex-start;
}
.row.assistant .bubble{
  background: rgba(17,24,39,.85);
}

.bubble .disclaimer{
  display:block;
  margin-top: 10px;
  font-size: 12px;
  color: var(--muted);
  border-top: 1px dashed rgba(255,255,255,.12);
  padding-top: 8px;
}

/* input */
.input-area{
  border-top: 1px solid var(--border);
  padding: 12px;
  display:flex;
  gap: 10px;
  background: rgba(15,23,42,.95);
}

textarea{
  flex:1;
  resize:none;
  border-radius: 14px;
  padding: 12px 12px;
  border: 1px solid var(--border);
  background: rgba(2,6,23,.35);
  color: var(--text);
  font-size: 14px;
  line-height: 1.3;
}
textarea:focus{
  outline:none;
  border-color: rgba(59,130,246,.55);
  box-shadow: 0 0 0 3px rgba(59,130,246,.15);
}

button{
  border:none;
  border-radius: 14px;
  padding: 0 18px;
  background: var(--accent);
  color: white;
  font-weight: 650;
  cursor:pointer;
}
button:hover{ filter: brightness(1.05); }
button:disabled{ opacity:.6; cursor:not-allowed; }

/* ===== Custom dark scrollbar ===== */
.chat::-webkit-scrollbar {
  width: 8px;
}

.chat::-webkit-scrollbar-track {
  background: transparent;
}

.chat::-webkit-scrollbar-thumb {
  background-color: rgba(148,163,184,0.25); /* muted bluish-gray */
  border-radius: 8px;
}

.chat::-webkit-scrollbar-thumb:hover {
  background-color: rgba(148,163,184,0.45);
}

/* Firefox */
.chat {
  scrollbar-width: thin;
  scrollbar-color: rgba(148,163,184,0.35) transparent;
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <div>Housing Analysis Assistant</div>
    <img src="/images/intuity_logo.png" alt="Intuity logo" class="logo">
  </div>

  <div class="chat" id="chat"></div>

  <form class="input-area" id="chat-form">
    <textarea id="chat-input" name="question" rows="2" placeholder="Ask a housing question…" autofocus></textarea>
    <button id="send-btn" type="submit">Send</button>
  </form>
</div>

<script>
(() => {
  const chat = document.getElementById("chat");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("chat-input");
  const sendBtn = document.getElementById("send-btn");

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }
  scrollToBottom();

  function addBubble(role, text, opts = {}) {
    const row = document.createElement("div");
    row.className = `row ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    if (opts.isThinking) {
      bubble.style.opacity = "0.75";
      bubble.style.fontStyle = "italic";
    }

    row.appendChild(bubble);
    chat.appendChild(row);
    scrollToBottom();
    return row;
  }

  // Enter sends, Shift+Enter newline
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    // show user message instantly
    addBubble("user", question);

    // show thinking instantly
    const thinkingRow = addBubble("assistant", "Thinking…", {isThinking: true});

    // lock UI
    input.value = "";
    input.disabled = true;
    sendBtn.disabled = true;

    try {
      const fd = new FormData();
      fd.append("question", question);

      const res = await fetch("/api/ask", { method: "POST", body: fd });
      const data = await res.json();

      // replace thinking with real reply
      thinkingRow.remove();
      addBubble("assistant", data.ok ? data.reply : "Error: " + (data.error || "Unknown"));
    } catch (err) {
      thinkingRow.remove();
      addBubble("assistant", "Error: could not reach the server.");
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
      scrollToBottom();
    }
  });
})();
</script>
</body>
</html>
